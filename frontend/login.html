<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Clínica de Estética</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <div class="login-container">
        <div class="login-box">
            <h1>💆 Clínica de Estética</h1>
            <h2>Acesso do Sistema</h2>

            <div id="erro-login" class="mensagem-erro" style="display:none;"></div>

            <div class="campo">
                <label>E-mail</label>
                <input type="email" id="email" placeholder="atendente@clinica.com">
            </div>

            <div class="campo">
                <label>Senha</label>
                <input type="password" id="senha" placeholder="••••••••">
            </div>

            <button onclick="fazerLogin()">Entrar</button>
        </div>
    </div>

    <script src="/static/app.js"></script>

</body>
</html>
